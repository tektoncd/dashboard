apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-dashboard
spec:
  workspaces:
    - name: source
  steps:
    - name: build-static
      image: docker.io/library/node:24.16.0-slim@sha256:2c87ef9bd3c6a3bd4b472b4bec2ce9d16354b0c574f736c476489d09f560a203
      workingDir: $(workspaces.source.path)
      env:
        - name: CI
          value: "true"
      script: |
        #!/usr/bin/env bash
        set -euxo pipefail

        npm ci
        npm run build
